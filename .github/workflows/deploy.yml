name: Deploy ECS Express API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.ECR_REPOSITORY }} .

      - name: Tag Docker Image
        run: docker tag ${{ secrets.ECR_REPOSITORY }}:latest ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push to ECR
        run: docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Deploy with SAM
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ecs-express-api-stack \
            --capabilities CAPABILITY_IAM \
            --region ${{ secrets.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              VpcId=${{ secrets.VPC_ID }} \
              Subnet1=${{ secrets.SUBNET_1 }} \
              Subnet2=${{ secrets.SUBNET_2 }} \
              SecurityGroup=${{ secrets.SECURITY_GROUP }} \
              EcrRegistry=${{ secrets.ECR_REGISTRY }} \
              EcrRepository=${{ secrets.ECR_REPOSITORY }} \
              AwsRegion=${{ secrets.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          CLUSTER_NAME="ecs-express-cluster"
          SERVICE_NAME=$(aws ecs list-services --cluster $CLUSTER_NAME --query 'serviceArns[0]' --output text)
          
          echo "Forcing new deployment of $SERVICE_NAME in $CLUSTER_NAME..."
          
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --force-new-deployment
